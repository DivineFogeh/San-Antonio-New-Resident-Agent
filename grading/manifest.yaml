# grading/manifest.yaml
# Reproducibility manifest — pinned versions, seeds, model IDs

project: SA New Resident Agent
course: CS 6263 NLP and Agentic AI
version: "1.0"

# Python environment
python_version: "3.11.0"
seed: 42

# Models
models:
  llm:
    name: llama-3.3-70b-instruct-awq
    provider: UTSA GPUStack
    endpoint_env: UTSA_LLM_BASE_URL
    temperature: 0.2
    max_tokens: 512
  embedding:
    name: sentence-transformers/all-MiniLM-L6-v2
    version: "2.7.0"
    dimensions: 384
    runtime: local_cpu

# Knowledge base
knowledge_base:
  vector_store: chromadb==0.5.0
  chunk_size: 512
  chunk_overlap: 64
  providers:
    - CPS_ENERGY
    - SAWS
    - CITY_SA
  expected_doc_count: 706
  tolerance: 50

# Infrastructure
infrastructure:
  backend_port: 8000
  crawler_port: 8001
  database: postgresql==16
  cache: redis==7

# Key dependency versions
dependencies:
  fastapi: "0.111.0"
  uvicorn: "0.30.1"
  sqlalchemy: "2.0.30"
  asyncpg: "0.29.0"
  redis: "5.0.4"
  httpx: "0.27.0"
  pydantic: "2.7.4"
  chromadb: "0.5.0"
  sentence_transformers: "2.7.0"
  langchain: "0.2.5"
  playwright: "1.44.0"
  torch: "2.3.1"

# Metrics
metrics:
  test_coverage_threshold: 70
  user_story_pass_rate: 90
  load_test_rps: 10
  load_test_error_rate: 5
  chroma_doc_count: 706
